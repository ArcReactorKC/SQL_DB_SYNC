FROM python:3.12-slim

LABEL org.opencontainers.image.title="sql-db-sync"
LABEL org.opencontainers.image.description="Incremental Ignition historian sync from Azure SQL to PostgreSQL"
LABEL org.opencontainers.image.source="https://github.com/ArcReactorKC/SQL_DB_SYNC"
LABEL org.opencontainers.image.licenses="MIT"

RUN apt-get update && apt-get install -y --no-install-recommends \
    freetds-dev \
    freetds-bin \
    gcc \
    && rm -rf /var/lib/apt/lists/*

WORKDIR /app
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt

COPY sync.py .

# /data   — watermark persistence (required, always mount this)
# /config — tables.json location (optional, only needed for non-sqlt tables)
VOLUME ["/data", "/config"]

CMD ["python", "-u", "sync.py"]
